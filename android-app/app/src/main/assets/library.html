<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a1a">
    <title>Library</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #1a1a1a;
            color: #d4d4d4;
            padding: 48px 40px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        h1 {
            color: #e8e8e8;
            font-size: 2em;
            font-weight: 700;
        }

        .settings-btn {
            background: none;
            border: 1px solid #3a3a3a;
            color: #888;
            width: 36px;
            height: 36px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .settings-btn:hover {
            color: #ccc;
            border-color: #555;
        }

        .settings-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .divider {
            height: 1px;
            background: #3a3a3a;
            margin-bottom: 32px;
        }

        .empty-msg {
            color: #777;
            font-size: 0.95em;
        }

        .empty-msg code {
            color: #aaa;
            background: #2a2a2a;
            padding: 2px 6px;
            border-radius: 3px;
        }

        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
        }

        .book-card {
            background: #252525;
            border-radius: 10px;
            padding: 20px;
            position: relative;
            border: 1px solid #2e2e2e;
            display: flex;
            flex-direction: column;
            height: 160px;
            cursor: pointer;
            min-width: 0;
        }

        .book-title {
            font-size: 1em;
            font-weight: 600;
            color: #e8e8e8;
            margin-bottom: 5px;
            line-height: 1.4;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .book-author {
            color: #999;
            font-size: 0.85em;
            margin-bottom: auto;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn {
            display: inline-block;
            background: #2e7d9c;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.85em;
            font-weight: 600;
            transition: background 0.15s ease;
            margin-top: 12px;
            align-self: flex-start;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #236a85;
        }

        /* Settings Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.visible { display: flex; }

        .modal {
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 12px;
            padding: 28px;
            max-width: 420px;
            width: 100%;
        }

        .modal h2 {
            color: #e8e8e8;
            font-size: 1.2em;
            margin: 0 0 20px 0;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            color: #999;
            font-size: 0.9em;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group .hint {
            color: #666;
            font-size: 0.8em;
            margin-top: 6px;
            line-height: 1.5;
        }

        .form-group textarea {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            border-radius: 6px;
            color: #d4d4d4;
            padding: 10px;
            font-size: 0.9em;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
            outline: none;
            box-sizing: border-box;
        }

        .form-group textarea:focus {
            border-color: #555;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .modal-btn {
            padding: 9px 18px;
            border-radius: 6px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }

        .modal-btn-cancel {
            background: #3a3a3a;
            color: #d4d4d4;
        }

        .modal-btn-cancel:hover {
            background: #4a4a4a;
        }

        .modal-btn-save {
            background: #2e7d9c;
            color: white;
        }

        .modal-btn-save:hover {
            background: #236a85;
        }

        @media (max-width: 600px) {
            body {
                padding: 24px 16px;
            }

            .book-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            h1 {
                font-size: 1.6em;
            }

            .book-card {
                padding: 14px;
                height: 130px;
            }

            .book-title {
                font-size: 0.95em;
            }
            
            .book-author {
                font-size: 0.8em;
            }
            
            .btn {
                padding: 6px 10px;
                font-size: 0.8em;
                margin-top: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Library</h1>
            <button class="settings-btn" onclick="openSettings()" title="Settings">
                <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/></svg>
            </button>
        </div>
        <div class="divider"></div>
        <div id="empty-msg" class="empty-msg" style="display:none;">
            No books found in Reader folder.<br>
            Sync processed books to <code>/storage/emulated/0/Reader/</code> using Syncthing.
        </div>
        <div class="book-grid" id="book-grid"></div>
    </div>
    
    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal">
            <h2>Settings</h2>
            <div class="form-group">
                <label for="eli5-prompt">ELI5 Prompt</label>
                <textarea id="eli5-prompt" placeholder="Explain this like I'm 5:&#10;&#10;"></textarea>
                <div class="hint">
                    This prompt is prepended to the selected text when you tap ELI5 in the reader.
                    The selected text is appended after this prompt.
                </div>
            </div>
            <div class="modal-actions">
                <button class="modal-btn modal-btn-cancel" onclick="closeSettings()">Cancel</button>
                <button class="modal-btn modal-btn-save" onclick="saveSettings()">Save</button>
            </div>
        </div>
    </div>
    <script>
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function openBook(bookId) {
            window.location.href = 'reader.html?book=' + encodeURIComponent(bookId);
        }

        function loadLibrary() {
            try {
                const booksJson = HReaderBridge.getBookList();
                const books = JSON.parse(booksJson);
                
                const grid = document.getElementById('book-grid');
                const emptyMsg = document.getElementById('empty-msg');
                
                if (!books || books.length === 0) {
                    emptyMsg.style.display = 'block';
                    return;
                }
                
                emptyMsg.style.display = 'none';
                grid.innerHTML = '';
                
                books.forEach(function(book) {
                    const card = document.createElement('div');
                    card.className = 'book-card';
                    card.onclick = function() { openBook(book.id); };
                    
                    card.innerHTML =
                        '<div class="book-title">' + escapeHtml(book.title) + '</div>' +
                        '<div class="book-author">' + escapeHtml(book.author || '') + '</div>' +
                        '<button class="btn" onclick="event.stopPropagation(); openBook(\'' + escapeHtml(book.id).replace(/'/g, "\\'") + '\')">Read Book</button>';
                    
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error('Error loading library:', error);
                document.getElementById('empty-msg').style.display = 'block';
                document.getElementById('empty-msg').textContent = 'Error loading books: ' + error.message;
            }
        }

        document.addEventListener('DOMContentLoaded', loadLibrary);
        
        // ---- SETTINGS ----
        
        var DEFAULT_ELI5_PROMPT = 'Explain this like I\'m 5:\n\n';
        
        function openSettings() {
            try {
                var settingsJson = HReaderBridge.getSettings();
                var settings = JSON.parse(settingsJson);
                var prompt = settings.eli5_prompt || DEFAULT_ELI5_PROMPT;
                document.getElementById('eli5-prompt').value = prompt;
            } catch(e) {
                document.getElementById('eli5-prompt').value = DEFAULT_ELI5_PROMPT;
            }
            document.getElementById('settings-modal').classList.add('visible');
        }
        
        function closeSettings() {
            document.getElementById('settings-modal').classList.remove('visible');
        }
        
        function saveSettings() {
            var prompt = document.getElementById('eli5-prompt').value;
            if (!prompt.trim()) prompt = DEFAULT_ELI5_PROMPT;
            
            try {
                var settingsJson = HReaderBridge.getSettings();
                var settings = JSON.parse(settingsJson);
                settings.eli5_prompt = prompt;
                HReaderBridge.saveSettings(JSON.stringify(settings));
            } catch(e) {
                var settings = { eli5_prompt: prompt };
                HReaderBridge.saveSettings(JSON.stringify(settings));
            }
            closeSettings();
        }
        
        // Close modal on overlay click
        document.addEventListener('DOMContentLoaded', function() {
            var overlay = document.getElementById('settings-modal');
            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) closeSettings();
            });
        });
    </script>
</body>
</html>
