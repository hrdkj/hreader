<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1e1e1e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HReader">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <title>Library</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #1a1a1a;
            color: #d4d4d4;
            padding: 48px 40px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            color: #e8e8e8;
            font-size: 2em;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .divider {
            height: 1px;
            background: #3a3a3a;
            margin-bottom: 32px;
        }

        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
        }

        .book-card { 
            background: #252525;
            border-radius: 10px;
            padding: 20px;
            position: relative;
            border: 1px solid #2e2e2e;
            display: flex;
            flex-direction: column;
            height: 160px;
        }

        .book-title {
            font-size: 1em;
            font-weight: 600;
            color: #e8e8e8;
            margin-bottom: 5px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .book-author {
            color: #999;
            font-size: 0.85em;
            margin-bottom: auto;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn {
            display: inline-block;
            background: #2e7d9c;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.85em;
            font-weight: 600;
            transition: background 0.15s ease;
            margin-top: 12px;
            align-self: flex-start;
        }

        .btn:hover {
            background: #236a85;
        }

        .book-remove-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #444;
            color: #aaa;
            border: none;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.15s ease, background 0.15s ease;
            line-height: 1;
        }

        .book-card:hover .book-remove-btn {
            opacity: 1;
        }

        .book-remove-btn:hover {
            background: #c0392b;
            color: white;
        }

        .book-card.fade-out {
            opacity: 0;
            transform: scale(0.97);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        /* Confirmation Modal */
        .confirm-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }

        .confirm-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .confirm-dialog {
            background: #2a2a2a;
            border-radius: 12px;
            padding: 28px;
            max-width: 380px;
            width: 90%;
            border: 1px solid #3a3a3a;
        }

        .confirm-dialog h3 {
            margin: 0 0 10px;
            color: #e8e8e8;
            font-size: 1.1em;
        }

        .confirm-dialog p {
            color: #999;
            margin: 0 0 20px;
            font-size: 0.9em;
            line-height: 1.5;
        }

        .confirm-dialog .confirm-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .confirm-dialog button {
            padding: 9px 18px;
            border-radius: 6px;
            border: none;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
        }

        .confirm-cancel {
            background: #3a3a3a;
            color: #d4d4d4;
        }

        .confirm-cancel:hover {
            background: #4a4a4a;
        }

        .confirm-remove {
            background: #c0392b;
            color: white;
        }

        .confirm-remove:hover {
            background: #a93226;
        }

        .empty-msg {
            color: #777;
            font-size: 0.95em;
        }

        .empty-msg code {
            color: #aaa;
            background: #2a2a2a;
            padding: 2px 6px;
            border-radius: 3px;
        }

        @media (max-width: 600px) {
            body {
                padding: 24px 16px;
            }

            .book-grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.6em;
            }

            .book-card {
                padding: 20px;
            }

            .book-title {
                font-size: 1.05em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Library</h1>
        <div class="divider"></div>

        {% if not books %}
            <p class="empty-msg">No processed books found. Run <code>reader3.py</code> on an epub first.</p>
        {% endif %}

        <div class="book-grid">
            {% for book in books %}
            <div class="book-card" id="card-{{ loop.index }}">
                <button class="book-remove-btn" onclick="confirmRemove(event, '{{ book.id | urlencode }}', '{{ book.title | e }}', 'card-{{ loop.index }}')">×</button>
                <div class="book-title">{{ book.title }}</div>
                <div class="book-author">{{ book.author }}</div>
                <a href="/read/{{ book.id | urlencode }}" class="btn">Read Book</a>
            </div>
            {% endfor %}
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-dialog">
            <h3>Remove Book</h3>
            <p id="confirmMessage">Are you sure?</p>
            <div class="confirm-actions">
                <button class="confirm-cancel" onclick="closeConfirm()">Cancel</button>
                <button class="confirm-remove" id="confirmBtn" onclick="doRemove()">Remove</button>
            </div>
        </div>
    </div>

    <script>
        let pendingRemove = { bookId: null, cardId: null };

        function confirmRemove(event, bookId, title, cardId) {
            event.stopPropagation();
            event.preventDefault();
            pendingRemove = { bookId: decodeURIComponent(bookId), cardId };
            document.getElementById('confirmMessage').textContent =
                `Remove "${title}"? This will delete all reading progress and highlights.`;
            document.getElementById('confirmOverlay').classList.add('active');
        }

        function closeConfirm() {
            document.getElementById('confirmOverlay').classList.remove('active');
            pendingRemove = { bookId: null, cardId: null };
        }

        async function doRemove() {
            const { bookId, cardId } = pendingRemove;
            if (!bookId) return;
            closeConfirm();

            try {
                const resp = await fetch(`/api/books/${encodeURIComponent(bookId)}`, { method: 'DELETE' });
                if (!resp.ok) {
                    const err = await resp.json();
                    alert(err.detail || 'Failed to remove book');
                    return;
                }
                const card = document.getElementById(cardId);
                if (card) {
                    card.classList.add('fade-out');
                    card.addEventListener('transitionend', () => card.remove());
                }
            } catch (e) {
                alert('Error removing book: ' + e.message);
            }
        }

        document.getElementById('confirmOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeConfirm();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeConfirm();
        });
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('Service Worker registered'))
                .catch(err => console.log('Service Worker registration failed:', err));
        }
    </script>
</body>
</html>
